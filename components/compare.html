<h2>Algorithm Comparison</h2>

<div class="card">
    <label>Number of Processes:</label>
    <input type="number" id="cmpN" min="1" max="20">
    <button onclick="generateCompareInputs()">Generate</button>
</div>

<div id="compareInputs"></div>

<div class="card">
    <label>Round Robin Quantum:</label>
    <input type="number" id="cmpQ" min="1">
</div>

<div class="card">
    <button onclick="runComparison()">Compare</button>
</div>

<p id="cmpError" class="error"></p>
<div id="cmpOutput"></div>
