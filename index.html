<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OS Simulator</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- HEADER -->
    <header>
        <h1>OS Resource Manager Simulator</h1>

        
        <p>Visualization of Operating System Algorithms</p>
    </header>

    <!-- NAVIGATION -->
    <nav>
        <button onclick="loadPage('scheduling')">CPU Scheduling</button>
        <button onclick="loadPage('page')">Page Replacement</button>
        <button onclick="loadPage('compare')">Comparison</button>
    </nav>

    <!-- MAIN CONTENT -->
    <main id="content">

        <div class="card" style="text-align:center;">
            <h2>Welcome</h2>
            <p>
                This simulator demonstrates key Operating System algorithms such as
                CPU Scheduling, Page Replacement, and Algorithm Comparison.
            </p>

            <p style="margin-top:10px;">
                Select a module from above to begin.
            </p>
        </div>

    </main>

    <!-- SCRIPTS -->
    <script src="js/utils.js"></script>
    <script src="js/gantt.js"></script>
    <script src="js/main.js"></script>

</body>
</html>
